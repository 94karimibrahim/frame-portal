version: 2
updates:
  # npm dependencies — weekly, with Angular packages grouped so the framework bumps land in one PR.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Angular majors are a deliberate, manual `ng update` on a branch (USING-AS-A-TEMPLATE §6) —
    # a Dependabot version bump would skip the migration schematics. Minors/patches stay automated.
    ignore:
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "angular-eslint"
        update-types: ["version-update:semver-major"]
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-eslint/*"
          - "angular-eslint"
      eslint:
        patterns:
          - "eslint"
          - "typescript-eslint"
          - "@eslint/*"

  # Keep the GitHub Actions in .github/workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
