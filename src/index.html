<!doctype html>
<html lang="en" dir="ltr" class="h-full">
  <head>
    <meta charset="utf-8" />
    <title>Frame Portal</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!--
      Content-Security-Policy is enforced via HTTP response headers at the host (see README.md
      "Deployment & security headers" for the exact directive string and deploy/nginx.conf.sample). It is
      NOT set as a <meta> here because a meta CSP cannot express frame-ancestors and would also break the
      dev server's HMR. script-src is 'self' (AOT, no inline scripts, no eval). The Outfit font is
      self-hosted (@fontsource, imported in styles.css), so no third-party origin is contacted; style-src
      still needs 'unsafe-inline' only because Angular inlines critical CSS as a <style> tag — removable
      by disabling optimization.styles.inlineCritical in angular.json.
    -->
  </head>
  <body class="h-full">
    <app-root></app-root>
  </body>
</html>
